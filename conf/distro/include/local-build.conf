# require by conf/local.conf

# lower than nominal priority, allows system functions to run
BB_NICE_LEVEL ??= "5"
# lower than nominal priority, allows system functions to run
BB_TASK_NICE_LEVEL ??= "6"
# logging configuration, output to ${TOPDIR}
BB_LOGCONFIG = "${TOPDIR}/../../layers/meta-distro/conf/logging-conf.json"
# if "1", bbappends without recipe are warning only
BB_DANGLINGAPPENDS_WARNONLY = "1"
# BB_MULTI_PROVIDER_ALLOWED = "1"

# UEFI variables VENDOR_UUID
VENDOR_UUID ??= "186dc214-eb89-430a-95e9-1a9bf4ad8923"

# GLIBC_GENERATE_LOCALES += "en_US.UTF-8"
# image language
# IMAGE_LINGUAS += "en-us"
# CORE_IMAGE_EXTRA_INSTALL += "glibc-locale-en-us"

# SDKMACHINE ??= "x86_64-mingw32"
# if "1", uses DEBUG_OPTIMIZATION flags
DEBUG_BUILD = "0"
# compiler optimization flags
FULL_OPTIMIZATION = "-Os -pipe ${DEBUG_FLAGS}"
DEBUG_OPTIMIZATION = "-Og -pipe ${DEBUG_FLAGS}"
SELECTED_OPTIMIZATION = "${@d.getVar(oe.utils.vartrue('DEBUG_BUILD', 'DEBUG_OPTIMIZATION', 'FULL_OPTIMIZATION', d))}"

# set artifacts output paths
DEPLOY_DIR_IPK = "${DEPLOY_DIR}/ipk"
DEPLOY_DIR_RPM = "${DEPLOY_DIR}/rpm"
DEPLOY_DIR_DEB = "${DEPLOY_DIR}/deb"
DEPLOY_DIR_IMAGE = "${DEPLOY_DIR}/images"
DEPLOY_DIR_TOOLS = "${DEPLOY_DIR}/tools"
# DEPLOY_DIR_SRC = "${DEPLOY_DIR}/src"
# SSTATE_ALLOW_OVERLAP_FILES += "${DEPLOY_DIR_IMAGE}/microcode"

# icecream compatible sstate signatures
# INHERIT += "icecc"
# ICECC_DISABLED ??= "1"

# runtime
TCMODE ??= "default"
# TCLIBC ??= "glibc"
# TCLIBCAPPEND = "-${TCLIBC}"

# if "1", do not install package recommendations
NO_RECOMMENDATIONS = "1"

# multiconfig
# BBMULTICONFIG:append = " mc-tclibc-glibc mc-tclibc-musl"

# base-passwd, root home ~root
ROOT_HOME = "/root"

# if "no", /var/log is persistent
VOLATILE_LOG_DIR = "no"
# if "no", /var/tmp is persistent
VOLATILE_TMP_DIR = "no"

# rm_work
INHERIT += "rm_work"
# optional. if set, package work is not removed
RM_WORK_EXCLUDE = ""

# cve-check
INHERIT:remove = "cve-check"
require conf/distro/include/cve-extra-exclusions.inc
# optional, if "0", patched cve are not reported
# CVE_CHECK_REPORT_PATCHED = "0"
# optional, if "0", warnings are not issued
# CVE_CHECK_SHOW_WARNINGS = "0"
# optional, if set, packages are skipped, allow list
# CVE_CHECK_SKIP_RECIPE = ""
# optional, if set, frequency of database updates
# CVE_DB_UPDATE_INTERVAL = "0"
# optional, if set, annotation of cve status
# CVE_STATUS[CVE-2000-00001] = "not-applicable-platform: Issue only applies on Windows"

# create-spdx
INHERIT:remove = "create-spdx"
# optional. if "1", output spdx files will be formatted
# SPDX_PRETTY = "1"
# optional. if "1", output spdx files includes [file-information section](https://spdx.github.io/spdx-spec/v2.3/file-information/)
# SPDX_INCLUDE_SOURCES = "0"
# optional. if "1", bitbake will create source files archive for each package
# SPDX_ARCHIVE_SOURCES = "0"
# optional. if "1", bitbake will create output binary archive for each package
# SPDX_ARCHIVE_PACKAGED = "0"

# buildhistory
INHERIT:remove = "buildhistory"
# optional. if "0", bitbake will not commit buildhistory
BUILDHISTORY_COMMIT = "0"

# buildinfo ${sysconfdir}/build
INHERIT += "image-buildinfo"
IMAGE_BUILDINFO_FILE = "${sysconfdir}/buildinfo"

# license archives management
INHERIT += "license"
# if "1", copy licenses to image
COPY_LIC_DIRS = "0"
# if "1", copy license manifest to image
COPY_LIC_MANIFEST = "1"
# if set, licenses to exclude from source archives
COPYLEFT_LICENSE_EXCLUDE = "CLOSED Proprietary"
# if "1", create license packages
LICENSE_CREATE_PACKAGE = "0"

# license-audit INCOMPATIBLE_LICENSE
INHERIT += "license-audit"
INCOMPATIBLE_LICENSE:tegra = ""

# license flags
LICENSE_FLAGS_ACCEPTED:remove = "commercial_ffmpeg"
QT_COMMERCIAL_MODULES = "0"

# QA warning/error configuration, override in package INSANE_SKIP = "flag"
# WARN_QA += ""
# ERROR_QA += ""

# inherit remove .la, override in package REMOVE_LIBTOOL_LA = "0"
# INHERIT += "remove-libtool"

# package management (deb, ipk, rpm)
# PACKAGE_CLASSES += "package_ipk"
# PACKAGE_CLASSES += "package_deb"
# PACKAGE_CLASSES += "package_rpm"
# INHERIT += "sign_ipk"
# INHERIT += "sign_rpm"
# INHERIT += "sign_package_feed"
# INHERIT += "${PACKAGE_CLASSES}"

# user-key-store
# require files/user-keys/keys.conf
# INHERIT += "user-key-store"

# ---
